<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<title>Projek Amelia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">


<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    min-height:100vh;

    /* Background Minecraft */
    background-image:url("background.jpg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:340px;
    padding:30px;
    text-align:center;

    background:rgba(40,40,40,0.55);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    border-radius:25px;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

.profile{
    width:130px;
    height:130px;
    border-radius:50%;
    border:4px solid white;
    object-fit:cover;
    margin-bottom:20px;
}

h1{
    color:white;
    font-size:42px;
    margin-bottom:10px;
}

p{
    color:#ddd;
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    background:#4CAF50;
    color:white;
    padding:16px;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
    margin:15px 0;
    transition:.3s;
}

.btn:hover{
    background:#3d9140;
    transform:scale(1.05);
}

.footer{
    color:#ddd;
    margin-top:25px;
    font-size:18px;

}
  
.profile{

width:150px;
height:150px;

border-radius:50%;

border:5px solid white;

object-fit:cover;

margin-bottom:20px;

}

h1{

color:white;

font-size:45px;

}

.desc{

color:#eeeeee;

margin-top:10px;

margin-bottom:35px;

}

.button{

display:block;

text-decoration:none;

padding:18px;

margin:15px 0;

background:#44b549;

color:white;

font-size:22px;

font-weight:bold;

border-radius:18px;

transition:.3s;

box-shadow:0 10px 20px rgba(0,0,0,.25);

}

.button:hover{

transform:translateY(-4px);

background:#54cb59;

}

.footer{

margin-top:30px;

color:white;

opacity:.8;

}

</style>

</head>

<body>

<div class="card">

<img class="profile" src="FOTO_PROFIL_KAMU.png">
